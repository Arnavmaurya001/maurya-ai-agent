<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maurya AI Agent</title>
    <!-- Dependencies: React, Tailwind, Lucide, Marked, Prism -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- No external icon dependencies needed (inlined in App.js) -->
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-color: #09090b; /* zinc-950 */
            color: #f4f4f5; /* zinc-100 */
        }
        
        pre code {
            font-family: 'JetBrains Mono', monospace !important;
        }

        /* Responsive height for Chat */
        .chat-container { height: calc(100vh - 12rem); }
        @media (max-width: 768px) { .chat-container { height: calc(100vh - 14rem); } }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 4px; }

        /* Prose Overrides */
        .prose pre { background-color: #18181b !important; border: 1px solid #27272a; }
        .prose code { color: #e4e4e7 !important; background: transparent !important; padding: 0 !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Main Application Script -->
    <script type="text/babel" src="./App.js"></script>
</body>
</html>
